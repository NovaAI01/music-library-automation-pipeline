<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      color-scheme: light;
      --border: #d8dee4;
      --muted: #59636e;
      --panel: #f6f8fa;
      --text: #1f2328;
      --accent: #0969da;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
    }
    header {
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 0 14px;
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    main { padding: 24px 0 48px; }
    .notice {
      margin: 0 0 18px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff8c5;
      color: #3b2f00;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      background: #fff;
    }
    .card .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      background: #fff;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      background: var(--panel);
      font-weight: 600;
    }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .path {
      max-width: 620px;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 13px;
    }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 22px;
    }
    .muted { color: var(--muted); }
    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      margin: 20px 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .review-table { margin-top: 22px; }
    .badge {
      display: inline-block;
      min-width: 64px;
      padding: 3px 8px;
      border-radius: 999px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .02em;
    }
    .confidence-high {
      color: #1a7f37;
      background: #dafbe1;
      border: 1px solid #aceebb;
    }
    .confidence-medium {
      color: #9a6700;
      background: #fff8c5;
      border: 1px solid #eed888;
    }
    .confidence-low {
      color: #cf222e;
      background: #ffebe9;
      border: 1px solid #ffcecb;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <h1>{{ title }}</h1>
      </div>
      <nav aria-label="Manual review pages">
        {% for href, label in nav_items %}
          <a href="{{ href }}">{{ label }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% if missing_files %}
      <div class="notice">Missing report data: {{ missing_files|join(", ") }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
