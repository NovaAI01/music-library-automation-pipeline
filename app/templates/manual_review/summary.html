{% extends "reports/base.html" %}
{% block content %}
<section class="cards">
  {% for label, value in cards %}
    <article class="card">
      <div class="label">{{ label }}</div>
      <div class="value">{{ value }}</div>
    </article>
  {% endfor %}
</section>
<section class="actions">
  <a class="action" href="/review/conflicts">Review governed conflicts</a>
  <a class="action" href="/review/blocked">Review blocked classifications</a>
  <a class="action" href="/review/quarantine">Review quarantined duplicates</a>
</section>
{% endblock %}
